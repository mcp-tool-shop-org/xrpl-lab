name: CI

on:
  push:
    paths:
      - "xrpl_lab/**"
      - "modules/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "xrpl_lab/**"
      - "modules/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check xrpl_lab/ tests/ > ruff.log 2>&1 || RUFF_EXIT=$?
          cat ruff.log
          exit ${RUFF_EXIT:-0}

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=pytest-report.xml

      - name: Dependency audit (pip-audit)
        # Catches known CVEs in the dependency tree. pip-audit is already a dev
        # dep (installed above via .[dev]) and verify.sh runs the same gate
        # locally, so CI mirrors local. Gated to a single matrix leg (3.12) —
        # auditing the resolved tree twice is redundant and the deps don't
        # differ by interpreter here; this keeps CI minutes lean.
        if: matrix.python-version == '3.12'
        # pipefail so a pip-audit non-zero exit (vulns found) propagates through
        # the tee and FAILS the job, rather than tee's success masking it.
        #
        # --skip-editable: the project installs itself editable via `pip install
        # -e ".[dev]"`; pip-audit cannot resolve the editable xrpl-lab on PyPI,
        # so we skip it and audit the dependency tree, not the project itself.
        #
        # NO --strict: `--strict` makes pip-audit exit non-zero whenever a dep is
        # *skipped* — including the editable self-package we skip above — so
        # `--strict --skip-editable` fails even with zero vulns ("distribution
        # marked as editable"). Without --strict, pip-audit still exits non-zero
        # on any *real* vulnerability, which is exactly the gate we want.
        #
        # --ignore-vuln PYSEC-2026-196: this advisory is against `pip` itself
        # (the installer/build toolchain), not a dependency we declare or ship.
        # CI upgrades pip above, and the audit is scoped to our declared tree;
        # auditing the installer is out of scope. Remove if pip is ever pinned
        # as a real dependency.
        run: |
          set -o pipefail
          pip-audit --skip-editable --ignore-vuln PYSEC-2026-196 | tee pip-audit.log

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-artifacts-${{ matrix.python-version }}
          path: |
            pytest-report.xml
            ruff.log
            pip-audit.log
            .pytest_cache/lastfailed
          retention-days: 14
          if-no-files-found: ignore
