# Build platform binaries for npm distribution via @mcptoolshop/npm-launcher.
# Asset naming convention (locked):
#   xrpl-lab-<version>-<os>-<arch>[.exe]
#   checksums-<version>.txt

name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          # macOS removed: 10x cost, users can install via pip/pipx instead
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - run: uv python install 3.12

      - run: uv venv

      - name: Install dependencies + PyInstaller
        run: uv pip install . "pyinstaller>=6.9.0"

      - name: Set path separator
        id: sep
        shell: bash
        run: echo "sep=$([[ "$RUNNER_OS" == "Windows" ]] && echo ';' || echo ':')" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run pyinstaller --onefile --name "xrpl-lab" --console \
            --collect-submodules rich \
            --collect-submodules pydantic \
            --collect-data xrpl \
            --add-data "modules${{ steps.sep.outputs.sep }}modules" \
            xrpl_lab/__main__.py
          OUTNAME="xrpl-lab-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/xrpl-lab${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
