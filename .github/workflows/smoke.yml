name: Smoke Test (Testnet)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  testnet-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install xrpl-lab
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run smoke test
        run: |
          # Tee the run to smoke.log so the WHY of a failure is captured, not
          # just a red X. The script prints only status lines and txid PREFIXES
          # — never wallet.seed — so the log is safe to surface/upload. `set -o
          # pipefail` keeps the python exit code (the tee would otherwise mask
          # a non-zero exit). On failure the on-failure step below and the
          # always-on artifact upload make smoke.log readable in the run UI.
          set -o pipefail
          python -c "
          import asyncio
          import json
          from xrpl.wallet import Wallet
          from xrpl_lab.transport.xrpl_testnet import XRPLTestnetTransport

          async def smoke():
              transport = XRPLTestnetTransport()

              # 1. Check network
              info = await transport.get_network_info()
              assert info.connected, f'RPC not connected: {info.rpc_url}'
              print(f'RPC connected: ledger {info.ledger_index}')

              # 2. Create temp wallet and fund
              wallet = Wallet.create()
              print(f'Temp wallet: {wallet.address}')

              fund = await transport.fund_from_faucet(wallet.address)
              assert fund.success, f'Faucet failed: {fund.message}'
              print(f'Funded: {fund.balance} XRP')

              # 3. Send self-payment
              result = await transport.submit_payment(
                  wallet.seed, wallet.address, '10', 'XRPLLAB|SMOKE'
              )
              assert result.success, f'Payment failed: {result.error}'
              print(f'Payment OK: {result.txid[:24]}...')

              # 4. Verify tx
              tx = await transport.fetch_tx(result.txid)
              assert tx.result_code == 'tesSUCCESS', f'Verify failed: {tx.result_code}'
              print(f'Verified: {tx.result_code}, ledger {tx.ledger_index}')

              print('Smoke test passed.')

          asyncio.run(smoke())
          " 2>&1 | tee smoke.log

      - name: Surface failure detail
        # When the smoke run fails, echo the captured log to the step summary
        # so the WHY (RPC down? faucet 429? verify mismatch?) is visible in the
        # run UI without re-running. No secrets: the script never prints seeds.
        if: failure()
        run: |
          {
            echo '### Testnet smoke failed'
            echo ''
            echo 'Last output from the smoke run (no secrets — status lines and txid prefixes only):'
            echo ''
            echo '```'
            cat smoke.log || echo '(smoke.log not produced — the run failed before any output)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke log
        # Always upload so a passing run's ledger/txid trace is inspectable too,
        # not just failures. retention is short — this is ephemeral diagnostics.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-log
          path: smoke.log
          retention-days: 7
          if-no-files-found: ignore
