name: Release

# Publishes the npm binary-launcher wrapper (@mcptoolshop/xrpl-lab) via OIDC
# trusted publishing — NO NPM_TOKEN — and creates the GitHub Release. Creating
# the release fires `release: published`, which triggers publish-pypi.yml (PyPI)
# and release-binaries.yml (the binaries the npm wrapper downloads) as separate
# runs. This workflow's filename (release.yml) is bound to the npm trusted
# publisher for mcp-tool-shop-org/xrpl-lab; do not rename it.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Serialize per-tag releases; do NOT cancel an in-flight release on a re-push of
# the same tag or a workflow_dispatch. Cancelling a mid-flight `npm publish`
# after the Sigstore provenance attestation is signed but before the registry
# packument commits leaves retries failing with E409 for 5-30 minutes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # GitHub Release creation
  id-token: write   # npm provenance + OIDC trusted-publishing auth

jobs:
  release:
    name: Publish npm (OIDC) + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm >=11.5 in a sandbox for OIDC trusted-publishing auth
        run: |
          # Node 22 ships npm 10.9, which signs Sigstore provenance but cannot
          # negotiate the OIDC auth path for trusted publishing (the PUT returns
          # a misleading 404 "not in this registry"). An in-place
          # `npm install -g npm@latest` races on the bundled npm's arborist
          # rebuild and breaks irrecoverably; a sandbox install + PATH shadow
          # avoids the race. See memory: npm-115-required-for-oidc.
          SANDBOX="$HOME/.npm-cli-sandbox"
          mkdir -p "$SANDBOX"
          pushd "$SANDBOX" >/dev/null
          echo '{"name":"npm-cli-sandbox","version":"0.0.0","private":true}' > package.json
          npm install --no-save --no-audit --no-fund --silent npm@latest
          popd >/dev/null
          echo "$SANDBOX/node_modules/.bin" >> "$GITHUB_PATH"
          "$SANDBOX/node_modules/.bin/npm" --version

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: ${GITHUB_REF_NAME} -> ${TAG_VERSION} | package.json: ${PKG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      # tomllib is stdlib in 3.11+; pin 3.11 so the check is reproducible across
      # runner-image bumps (matches ci.yml / publish-pypi.yml setup-python SHA).
      - name: Setup Python for pyproject version check
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Verify tag matches pyproject.toml version
        run: |
          PY_VERSION=$(python3 -c "import tomllib; print(tomllib.loads(open('pyproject.toml').read())['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "pyproject.toml: ${PY_VERSION}"
          if [ "${PY_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match pyproject.toml version ${PY_VERSION}"
            exit 1
          fi

      # bin/xrpl-lab.js holds the version+tag npm-launcher uses to pick which
      # GitHub Release binary to download. It drifted to v1.7.1 while
      # package.json/pyproject moved to 1.8.0 (CIDOCS-A-001) precisely because it
      # was never gated here — so npx fetched a stale binary. This step asserts
      # both the `version` and `tag` fields in the launch config equal the
      # release tag, failing the job on any mismatch.
      #
      # NOTE: the *runtime* Python version (xrpl_lab/__init__.py) is single-
      # sourced — it reads importlib.metadata.version("xrpl-lab"), so it tracks
      # pyproject [project].version automatically and needs no gate here. The
      # source-checkout fallback literal is pinned to pyproject by the unit test
      # tests/test_v2_core.py::test_version_matches_pyproject.
      - name: Verify tag matches bin/xrpl-lab.js launch config
        run: |
          # export (not a bare shell var) so the child `node` process sees it in
          # process.env — the shell-var form read undefined in node and false-failed
          # every real tag push (the local test masked it; CI semantics differ).
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          node -e '
            const fs = require("fs");
            const src = fs.readFileSync("bin/xrpl-lab.js", "utf8");
            const m = src.match(/MCPTOOLSHOP_LAUNCH_CONFIG\s*=\s*JSON\.stringify\((\{[\s\S]*?\})\)/);
            if (!m) { console.error("::error::Could not locate MCPTOOLSHOP_LAUNCH_CONFIG in bin/xrpl-lab.js"); process.exit(1); }
            const cfg = eval("(" + m[1] + ")");
            const tag = process.env.TAG_VERSION;
            console.log("bin/xrpl-lab.js: version=" + cfg.version + " tag=" + cfg.tag + " | tag: " + tag);
            let ok = true;
            if (cfg.version !== tag) { console.error("::error::Tag " + tag + " does not match bin/xrpl-lab.js version " + cfg.version); ok = false; }
            if (cfg.tag !== "v" + tag) { console.error("::error::Release tag v" + tag + " does not match bin/xrpl-lab.js tag " + cfg.tag); ok = false; }
            process.exit(ok ? 0 : 1);
          '

      # The wrapper's sole dep is @mcptoolshop/npm-launcher (digest-locked by the
      # registry); no package-lock.json is committed, so `npm install` is honest.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: npm pack dry-run (verify tarball shape)
        run: npm pack --dry-run

      - name: Publish to npm with provenance (OIDC trusted publisher)
        run: npm publish --provenance --access public

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract the `## <version> — ...` section from CHANGELOG.md as notes;
          # fall back to the tag name if the section is missing.
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$(mktemp)"
          awk -v ver="${VERSION}" '
            $0 ~ "^## " ver " " {capture=1; next}
            capture && /^## / {exit}
            capture {print}
          ' CHANGELOG.md > "${NOTES_FILE}"

          if [ ! -s "${NOTES_FILE}" ]; then
            echo "XRPL Lab ${GITHUB_REF_NAME}" > "${NOTES_FILE}"
            echo "" >> "${NOTES_FILE}"
            echo "See CHANGELOG.md for details." >> "${NOTES_FILE}"
          fi

          # Idempotent: skip creation if the release already exists (re-pushed
          # tag / workflow_dispatch re-run). Publishing the release fires
          # `release: published` -> publish-pypi.yml + release-binaries.yml.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; skipping create."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "XRPL Lab ${GITHUB_REF_NAME}" \
              --notes-file "${NOTES_FILE}" \
              --verify-tag
          fi
